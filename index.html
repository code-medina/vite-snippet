<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite-snippet/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Snippet Manager</title>
    <script type="module" crossorigin src="/vite-snippet/assets/index-BaQzpkCK.js"></script>
    <link rel="stylesheet" crossorigin href="/vite-snippet/assets/index-C7YX4PpU.css">
  </head>
  <body class="bg-pink-50 min-h-screen flex flex-col">
    <!-- HEADER -->
    <header class="bg-pink-500 text-white p-6">
      <h1 class="text-3xl font-bold text-center">Snippet Manager</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex flex-col md:flex-row gap-6 p-6 flex-1">
      <!-- FORM FILTER -->
      <section class="w-full md:w-1/3 bg-pink-100 p-4 rounded-lg shadow-md">
        <form id="form-filter" class="flex flex-col space-y-4">
          <!-- LANGUAGE SELECT -->
          <div class="flex flex-col">
            <label for="filter-language-select" class="text-sm font-medium text-gray-700 mb-1">Language</label>
            <select
              name="filter-language-select"
              id="filter-language-select"
              class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
              <!-- Options -->
            </select>
          </div>

          <!-- TAGS INPUT -->
          <div class="flex flex-col">
            <label for="filter-tags-txt" class="text-sm font-medium text-gray-700 mb-1">Tags</label>
            <input
              id="filter-tags-txt"
              name="filter-tags-txt"
              type="text"
              placeholder="Filter tags"
              class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
          </div>

          <!-- RADIO ORDER -->
          <fieldset class="flex items-center space-x-4">
            <legend class="text-sm font-medium text-gray-700">Order</legend>
            <div class="flex items-center">
              <input type="radio" name="orden-radio" id="asc" value="asc" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
              <label for="asc" class="ml-2 text-sm text-gray-700">Asc date</label>
            </div>
            <div class="flex items-center">
              <input type="radio" name="orden-radio" id="desc" value="desc" checked class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
              <label for="desc" class="ml-2 text-sm text-gray-700">Desc date</label>
            </div>
          </fieldset>

          <!-- SUBMIT BUTTON -->
          <button type="submit" class="w-full bg-pink-600 text-white py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Filter
          </button>
        </form>
      </section>

      <!-- SNIPPETS & CREATE FORM -->
      <section class="flex-1 flex flex-col md:flex-row gap-6">
        <!-- CARDS CONTAINER -->
        <div id="cardsContainer" class="flex-1 bg-pink-50 p-4 rounded-lg shadow-inner overflow-auto">
          <!-- Aquí irán las tarjetas dinámicas -->
        </div>

        <!-- CREATE SNIPPET FORM -->
        <form id="form-create" class="flex-1 bg-pink-100 p-6 rounded-lg shadow-md flex flex-col space-y-4">
          <h2 class="text-xl font-bold text-gray-800">Add Snippet</h2>

          <!-- TITLE -->
          <div class="flex flex-col">
            <label for="title-txt" class="text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" id="title-txt" name="title-txt" placeholder="Your title" required
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <p id="title-txt-error" class="mt-2.5 text-sm text-fg-danger-strong"></p>

          </div>

          <!-- CODE -->
          <div class="flex flex-col">
            <label for="code-textarea" class="text-sm font-medium text-gray-700 mb-1">Code</label>
            <textarea id="code-textarea" name="code-textarea" rows="6" placeholder="Enter your code"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
              <p id="code-textarea-error" class="mt-2.5 text-sm text-fg-danger-strong"></p>

          </div>

          <!-- LANGUAGE SELECT -->
          <div class="flex flex-col">
            <label for="language-select" class="text-sm font-medium text-gray-700 mb-1">Language</label>
            <select id="language-select" name="language-select" required
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <!-- Options -->
            </select>
              <p id="language-select-error" class="mt-2.5 text-sm text-fg-danger-strong"></p>

          </div>

          <!-- TAGS -->
          <div class="flex flex-col">
            <label for="tags-txt" class="text-sm font-medium text-gray-700 mb-1">Tags</label>
            <input type="text" id="tags-txt" name="tags-txt" placeholder="Create tags with spaces"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <p id="tags-txt-error" class="mt-2.5 text-sm text-fg-danger-strong"></p>

          </div>

          <!-- SUBMIT BUTTON -->
          <button type="submit" class="w-full bg-pink-600 text-white py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Create Snippet
          </button>
        </form>
      </section>
    </main>

  </body>
</html>
